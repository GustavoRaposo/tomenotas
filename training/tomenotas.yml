# Config de treino do wake word "Tomenotas" (openWakeWord).
# Usado pelo train.py do openWakeWord — ver training/README.md.
# Caminhos são relativos ao diretório de trabalho (WORKDIR do setup.sh).

model_name: "tomenotas"

# Ativa em qualquer uma das frases (ainda é um modelo binário).
# "tome notas" ajuda porque são duas palavras reais que o TTS pronuncia bem.
target_phrase:
  - "tomenotas"
  - "tome notas"
  - "tomi notas"
  - "tominotas"

# Frases que NÃO devem ativar (reduz falsos positivos parecidos).
custom_negative_phrases: []

# Amostras positivas sintéticas (mín. recomendado 20k; 30k é um bom
# equilíbrio para GPU de 4GB / algumas horas).
n_samples: 30000
n_samples_val: 2000

# Batches — reduzidos para caber numa GTX 1650 (4GB). Aumente se tiver
# mais VRAM.
tts_batch_size: 25
augmentation_batch_size: 16

piper_sample_generator_path: "./piper-sample-generator"
output_dir: "./tomenotas_model"

rir_paths:
  - "./mit_rirs"
background_paths:
  - "./background_clips"
background_paths_duplication_rate:
  - 1

false_positive_validation_data_path: "./validation_set_features.npy"
augmentation_rounds: 1

feature_data_files:
  "ACAV100M_sample": "./openwakeword_features_ACAV100M_2000_hrs_16bit.npy"

batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 50
  "positive": 50

model_type: "dnn"
layer_size: 32

steps: 50000
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
